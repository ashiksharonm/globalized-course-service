server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Locale JSON files: allow cross-origin fetch from the SPA
    location /locales/ {
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # API proxy to backend (used in Docker Compose; in production this is the API Gateway)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: all other routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable nginx version in Server header
    server_tokens off;
}
