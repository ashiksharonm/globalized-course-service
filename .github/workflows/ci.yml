name: CI — Globalized Course Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch when a new push arrives.
# Prevents stale test results from lingering for long-running PRs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────── Backend ──────────
  backend-test:
    name: Backend — Lint, Type Check, Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: globalized-course-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run unit tests (no DB required)
        run: ./mvnw test -B

      - name: Fail on test failure
        if: failure()
        run: echo "::error::Backend unit tests failed. Fix before merging." && exit 1

  backend-integration-test:
    name: Backend — Repository Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: backend-test        # Only run IT if unit tests pass
    defaults:
      run:
        working-directory: globalized-course-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run integration tests (Testcontainers spins up real Postgres)
        run: ./mvnw verify -B -P integration-test

  # ────────── Frontend ──────────
  frontend-test:
    name: Frontend — Lint, TypeCheck, Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: globalized-course-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: globalized-course-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Jest tests
        run: npm test -- --watchAll=false --coverage --ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: globalized-course-ui/coverage/

  # ────────── Docker Build ──────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]   # Only build images after tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./globalized-course-service
          push: false          # Build only — no registry push in CI (push on tag/release)
          tags: globalized-course-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./globalized-course-ui
          push: false
          tags: globalized-course-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
