name: CI — Globalized Course Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────── Backend ──────────
  backend-test:
    name: Backend — Lint, Type Check, Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: globalized-course-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # 'maven' cache key is built-in — caches ~/.m2/repository automatically
          cache: maven

      - name: Run unit tests
        # Use 'mvn' (pre-installed on ubuntu-latest) instead of ./mvnw
        # to avoid wrapper download issues on CI runners.
        run: mvn test -B

  backend-integration-test:
    name: Backend — Repository Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: globalized-course-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests (Testcontainers + real Postgres)
        run: mvn verify -B -P integration-test

  # ────────── Frontend ──────────
  frontend-test:
    name: Frontend — Lint, TypeCheck, Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: globalized-course-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # npm install (not npm ci) because package-lock.json is not committed.
        # A lockfile will be generated on first run and cached by subsequent CI runs.
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Jest unit tests
        run: npm test -- --watchAll=false --coverage --ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: globalized-course-ui/coverage/

  # ────────── Docker Build ──────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./globalized-course-service
          push: false
          tags: globalized-course-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./globalized-course-ui
          push: false
          tags: globalized-course-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
